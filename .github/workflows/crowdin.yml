name: Crowdin Sync

on:
  push:
    branches: [main, feat/i18n]
    paths:
      - "src/i18n/locales/zh-CN/**"
  workflow_dispatch:

jobs:
  synchronize:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 推 l10n/crowdin 分支
      pull-requests: write # 开回流译文 PR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crowdin push & pull
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          localization_branch_name: l10n/crowdin
          create_pull_request: true
          pull_request_title: "chore(i18n): 回流 Crowdin 译文"
          pull_request_base_branch_name: "main"
        env:
          # crowdin/github-action 开回流 PR 需显式拿到 GITHUB_TOKEN（permissions 块不足以注入）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
