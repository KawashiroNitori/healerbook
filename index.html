<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healerbook</title>
    <script>
      // 与 src/store/uiStore.ts 的 getInitialTheme/applyTheme 同步，避免 FOUC
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          if (theme === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <style>
      html,
      body {
        margin: 0;
        background: hsl(0 0% 100%);
      }
      html.dark,
      html.dark body {
        background: hsl(0 0% 3.9%);
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #initial-loader svg {
        width: 32px;
        height: 32px;
        color: hsl(0 0% 45.1%);
        opacity: 0;
        /* 阈值与 FullScreenLoader.SHOW_AFTER_MS 同步：导航 2s 后才显示 */
        animation:
          initial-loader-spin 1s linear infinite,
          initial-loader-appear 200ms ease-out 2s forwards;
      }
      html.dark #initial-loader svg {
        color: hsl(0 0% 63.9%);
      }
      @keyframes initial-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes initial-loader-appear {
        to {
          opacity: 1;
        }
      }
    </style>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="8f1c1c3a-39b6-469e-ace0-5043cac21b0c" data-domains="xivhealer.com"></script>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "7d06102fb22e41b195ebfcf1e023480e"}'></script>
  </body>
</html>
