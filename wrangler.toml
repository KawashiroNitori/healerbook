name = "healerbook"
main = "workers/fflogs-proxy.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

[triggers]
crons = ["0 */12 * * *"]

[[queues.producers]]
queue = "top100-sync-queue"
binding = "TOP100_SYNC_QUEUE"

[[queues.producers]]
queue = "statistics-extract-queue"
binding = "STATISTICS_EXTRACT_QUEUE"

[[queues.consumers]]
queue = "top100-sync-queue"
max_batch_size = 1
max_batch_timeout = 30
max_retries = 3

[[queues.consumers]]
queue = "statistics-extract-queue"
max_batch_size = 1
max_batch_timeout = 30
max_retries = 3

[assets]
directory = "dist/client"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[kv_namespaces]]
binding = "healerbook"
id = "b2d47d0e3be342248906a82ea3a540d5"

# 开发环境
[env.development]
[env.development.vars]
ENVIRONMENT = "development"
FFLOGS_API_URL = "https://www.fflogs.com/v1"

# 生产环境
[env.production]
[env.production.vars]
ENVIRONMENT = "production"
FFLOGS_API_URL = "https://www.fflogs.com/v1"
RATE_LIMIT_RPM = "30"
CACHE_TTL = "3600"

[[env.development.kv_namespaces]]
binding = "healerbook"
id = "b2d47d0e3be342248906a82ea3a540d5"

[[env.production.kv_namespaces]]
binding = "healerbook"
id = "4d48c91437374775b166165a05d56839"

# Secrets (通过 wrangler secret 设置)
# v1 API
# wrangler secret put FFLOGS_API_KEY
#
# v2 API (OAuth)
# wrangler secret put FFLOGS_CLIENT_ID
# wrangler secret put FFLOGS_CLIENT_SECRET
#
# 手动同步接口鉴权
# wrangler secret put SYNC_AUTH_TOKEN

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
